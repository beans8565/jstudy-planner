<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1410">
<meta name="mobile-web-app-capable" content="yes">
<title>EDU 메모장</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink:#1a1410; --paper:#f5f0e8; --paper-dark:#ede8dc;
  --accent:#8b3a2a; --line:#d4cfc4; --ghost:#a09890; --tag-bg:#e8dfd0;
  --red:#e53935; --red-bg:#fff5f5;
  --yellow:#f9a825; --yellow-bg:#fffde7;
  --green:#43a047; --green-bg:#f1f8e9;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--paper);font-family:'Noto Sans KR',sans-serif;color:var(--ink)}

.sync-bar{background:#2c2420;color:#c0b0a0;padding:5px 16px;font-size:.7rem;display:flex;align-items:center;gap:7px;justify-content:center}
.sdot{width:7px;height:7px;border-radius:50%;background:#666;flex-shrink:0}
.sdot.on{background:#43a047} .sdot.sy{background:#f9a825;animation:pu .8s infinite} .sdot.er{background:#e53935}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}

.ibanner{background:#2c2420;color:var(--paper);padding:9px 14px;display:none;align-items:center;justify-content:space-between;gap:8px;font-size:.78rem}
.ibanner.show{display:flex}
.ibtn{background:#c0624e;color:white;border:none;border-radius:4px;padding:5px 13px;font-size:.75rem;font-family:inherit;cursor:pointer;font-weight:500}
.iclose{background:none;border:none;color:#a09890;cursor:pointer;font-size:1.1rem;padding:0 4px}

header{background:var(--ink);color:var(--paper);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3)}
header h1{font-family:'Nanum Myeongjo',serif;font-size:1.1rem;font-weight:800;letter-spacing:.05em}
#cnt{font-size:.7rem;color:#a09890}

.izone{background:white;border-bottom:1px solid var(--line);padding:13px}
.prow{display:flex;gap:6px;margin-bottom:9px}
.pbtn{flex:1;border:2px solid var(--line);border-radius:8px;padding:8px 4px;background:white;cursor:pointer;font-size:.73rem;font-family:inherit;font-weight:500;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--ghost);transition:all .15s}
.pbtn .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pbtn[data-p=high] .dot{background:var(--red)} .pbtn[data-p=mid] .dot{background:var(--yellow)} .pbtn[data-p=low] .dot{background:var(--green)}
.pbtn[data-p=high].on{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.pbtn[data-p=mid].on{border-color:var(--yellow);background:var(--yellow-bg);color:#b07d00}
.pbtn[data-p=low].on{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.pbtn[data-p=none].on{border-color:var(--ink);background:var(--paper-dark);color:var(--ink)}
.iwrap{position:relative;background:var(--paper);border:1.5px solid var(--line);border-radius:6px;overflow:hidden}
.iwrap:focus-within{border-color:var(--accent)}
#minput{width:100%;min-height:64px;max-height:170px;background:transparent;border:none;outline:none;font-family:inherit;font-size:.91rem;font-weight:300;color:var(--ink);line-height:1.7;padding:11px 13px 35px;resize:none}
#minput::placeholder{color:var(--ghost);font-style:italic}
.ifoot{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:5px 9px;background:var(--paper-dark);border-top:1px solid var(--line)}
#ccount{font-size:.67rem;color:var(--ghost)}
#savebtn{background:var(--accent);color:white;border:none;border-radius:4px;padding:5px 13px;font-size:.75rem;font-family:inherit;cursor:pointer;font-weight:500}
#savebtn:disabled{background:#ccc;cursor:not-allowed}

.toolbar{padding:9px 13px;display:flex;align-items:center;gap:7px;background:var(--paper-dark);border-bottom:1px solid var(--line)}
.swrap{position:relative;flex:1}
.swrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:.7rem;pointer-events:none}
#srch{width:100%;background:white;border:1px solid var(--line);border-radius:20px;padding:7px 12px 7px 28px;font-size:.78rem;font-family:inherit;color:var(--ink);outline:none}
.tbbtn{background:white;border:1px solid var(--line);border-radius:4px;padding:7px 9px;font-size:.73rem;font-family:inherit;cursor:pointer;white-space:nowrap;color:var(--ink)}
.tbbtn.d{color:#c0392b;border-color:#e0b0aa}

.fchips{display:flex;gap:5px;flex-wrap:wrap;padding:7px 13px 8px;background:var(--paper-dark);border-bottom:1px solid var(--line)}
.chip{border:1.5px solid var(--line);border-radius:20px;padding:4px 10px;font-size:.7rem;font-family:inherit;background:white;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500;color:var(--ghost)}
.chip .cd{width:7px;height:7px;border-radius:50%}
.chip[data-f=all].on{background:var(--ink);color:white;border-color:var(--ink)}
.chip[data-f=high].on{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.chip[data-f=mid].on{background:var(--yellow-bg);color:#b07d00;border-color:var(--yellow)}
.chip[data-f=low].on{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.chip[data-f=none].on{background:var(--paper-dark);color:var(--ink);border-color:var(--ink)}

#mlist{padding:13px 12px 30px;display:flex;flex-direction:column;gap:10px;max-width:720px;margin:0 auto}
.empty{text-align:center;padding:52px 20px;color:var(--ghost)}
.empty .ei{font-size:2.5rem;margin-bottom:12px;opacity:.4}
.empty p{font-size:.86rem;font-style:italic;line-height:1.9}

.card{background:white;border:1px solid var(--line);border-left:4px solid var(--line);border-radius:8px;overflow:hidden;animation:si .2s ease}
.card[data-p=high]{border-left-color:var(--red)} .card[data-p=mid]{border-left-color:var(--yellow)} .card[data-p=low]{border-left-color:var(--green)}
@keyframes si{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.card.del{animation:so .24s ease forwards}
@keyframes so{to{opacity:0;transform:translateX(20px)}}

.ctop{padding:11px 11px 8px;display:flex;align-items:flex-start;gap:8px}
.badge{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;cursor:pointer;border:none}
.badge[data-p=high]{background:var(--red);color:white} .badge[data-p=mid]{background:var(--yellow);color:white}
.badge[data-p=low]{background:var(--green);color:white} .badge[data-p=none]{background:var(--line);color:var(--ghost)}
.mtext{flex:1;min-width:0;font-size:.89rem;line-height:1.75;color:var(--ink);font-weight:300;word-break:break-word;overflow-wrap:anywhere}
.cbtns{display:flex;gap:1px;flex-shrink:0}
.abtn{background:none;border:none;cursor:pointer;padding:5px 6px;border-radius:4px;font-size:.8rem;color:var(--ghost);line-height:1}
.abtn:active{background:var(--paper-dark)}

.cbot{padding:6px 11px;display:flex;align-items:center;justify-content:space-between;gap:7px;background:var(--paper);border-top:1px dashed var(--line)}
.tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.tag{background:var(--tag-bg);color:var(--accent);font-size:.64rem;padding:2px 6px;border-radius:10px;font-weight:500}
.mtime{font-size:.65rem;color:var(--ghost);white-space:nowrap;font-weight:300}

.ppop{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);border-radius:16px;padding:12px 16px;display:flex;gap:14px;opacity:0;pointer-events:none;transition:all .2s;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.ppop.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.popt{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:4px 7px;border-radius:8px}
.popt:active{background:rgba(255,255,255,.12)}
.pdot{width:15px;height:15px;border-radius:50%}
.popt span{font-size:.63rem;color:#c0b0a0;font-family:inherit}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:var(--paper);padding:8px 16px;border-radius:20px;font-size:.78rem;font-family:inherit;opacity:0;transition:all .22s;pointer-events:none;z-index:998;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity .3s}
.loading.hide{opacity:0;pointer-events:none}
.spin{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading p{font-size:.85rem;color:var(--ghost)}
mark{background:rgba(200,80,60,.18);color:inherit;border-radius:2px}

/* 편집 textarea */
.etarea{width:100%;min-height:52px;background:var(--paper);border:1px solid var(--accent);border-radius:4px;padding:6px 8px;outline:none;resize:none;font-family:inherit;font-size:.89rem;line-height:1.75;color:var(--ink)}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spin"></div><p>불러오는 중...</p></div>

<div class="sync-bar"><div class="sdot" id="sdot"></div><span id="stxt">연결 중...</span></div>

<div class="ibanner" id="ibanner">
  <span>📱 홈 화면에 앱으로 추가 가능해요</span>
  <div style="display:flex;gap:7px;align-items:center">
    <button class="ibtn" id="ibtn">설치하기</button>
    <button class="iclose" id="iclose">✕</button>
  </div>
</div>

<header>
  <h1>📝 EDU 메모장</h1>
  <span id="cnt">메모 0개</span>
</header>

<div class="izone">
  <div class="prow" id="prow">
    <button class="pbtn" data-p="high"><span class="dot"></span>긴급</button>
    <button class="pbtn" data-p="mid"><span class="dot"></span>보통</button>
    <button class="pbtn on" data-p="low"><span class="dot"></span>낮음</button>
    <button class="pbtn" data-p="none" style="max-width:46px">─</button>
  </div>
  <div class="iwrap">
    <textarea id="minput" placeholder="아무렇게나 적어도 괜찮아요 ✨"></textarea>
    <div class="ifoot">
      <span id="ccount">0자</span>
      <button id="savebtn">저장 ↵</button>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="swrap"><input id="srch" placeholder="메모 검색..."/></div>
  <button class="tbbtn" id="sortbtn">📅 <span id="sortlbl">최신순</span></button>
  <button class="tbbtn d" id="clearbtn">🗑</button>
</div>

<div class="fchips" id="fchips">
  <button class="chip on" data-f="all">전체</button>
  <button class="chip" data-f="high"><span class="cd" style="background:var(--red)"></span>긴급</button>
  <button class="chip" data-f="mid"><span class="cd" style="background:var(--yellow)"></span>보통</button>
  <button class="chip" data-f="low"><span class="cd" style="background:var(--green)"></span>낮음</button>
  <button class="chip" data-f="none">미설정</button>
</div>

<div id="mlist"></div>

<div class="ppop" id="ppop">
  <div class="popt" data-pv="high"><div class="pdot" style="background:var(--red)"></div><span>긴급</span></div>
  <div class="popt" data-pv="mid"><div class="pdot" style="background:var(--yellow)"></div><span>보통</span></div>
  <div class="popt" data-pv="low"><div class="pdot" style="background:var(--green)"></div><span>낮음</span></div>
  <div class="popt" data-pv="none"><div class="pdot" style="background:var(--line)"></div><span>미설정</span></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase ──
const SB_URL = 'https://chjbyieniibyhwvyxtkz.supabase.co';
const SB_KEY = 'sb_publishable_u2hZXa0Fo6KhLCjbbh4UVA_UKCfJ7pd';
const db = supabase.createClient(SB_URL, SB_KEY);

// ── State ──
let memos = [], sortAsc = false, filter = 'all', pri = 'low', popId = null;

// ── Tags ──
const TAGS = [
  {kw:['학생','아이','얘','쟤'], t:'학생'},
  {kw:['수업','강의','수학','영어','국어','과학'], t:'수업'},
  {kw:['운영','관리','시스템','규칙','환경'], t:'운영'},
  {kw:['아이디어','어떨까','해보자','개선'], t:'아이디어'},
  {kw:['계획','일정','스케줄','주간','목표'], t:'계획'},
  {kw:['상담','학부모','부모','전화','연락'], t:'상담'},
  {kw:['입시','수능','내신','대입','전략'], t:'입시'},
];
function autoTag(s) {
  const r=[], l=s.toLowerCase();
  TAGS.forEach(x=>{ if(x.kw.some(k=>l.includes(k))&&!r.includes(x.t)) r.push(x.t); });
  return r;
}

// ── Utils ──
function ftime(ts) {
  const d=new Date(ts), n=new Date(), diff=n-d;
  if(diff<60000) return '방금 전';
  if(diff<3600000) return Math.floor(diff/60000)+'분 전';
  if(diff<86400000) return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
  return (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toHtml(text, q) {
  // 모든 줄바꿈 정규화 후 <br> 변환
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  const escaped = lines.map(l => esc(l));
  let html = escaped.join('<br>');
  if (q) {
    const eq = esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    html = html.replace(new RegExp('('+eq+')','gi'),'<mark>$1</mark>');
  }
  return html;
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function sync(s,msg) {
  document.getElementById('sdot').className='sdot '+s;
  document.getElementById('stxt').textContent=msg;
}

function updateCnt() {
  document.getElementById('cnt').textContent='메모 '+memos.length+'개';
}

// ── DB ──
async function load() {
  try {
    sync('sy','불러오는 중...');
    const {data,error} = await db.from('memos').select('*').order('created_at',{ascending:false});
    if(error) throw error;
    memos = data.map(m=>({
      id: m.id,
      text: m.text||'',
      priority: m.priority||'none',
      tags: JSON.parse(m.tags||'[]'),
      ts: new Date(m.created_at).getTime()
    }));
    sync('on','동기화됨 ✓');
  } catch(e) {
    sync('er','연결 오류');
    memos = JSON.parse(localStorage.getItem('edu_backup')||'[]');
  }
  updateCnt();
  render();
  document.getElementById('loading').classList.add('hide');
}

async function dbAdd(text, priority, tags) {
  sync('sy','저장 중...');
  try {
    const {error} = await db.from('memos').insert({text, priority, tags:JSON.stringify(tags)});
    if(error) throw error;
    sync('on','동기화됨 ✓');
    await load();
  } catch(e) { sync('er','저장 실패'); toast('❌ 저장 실패'); }
}

async function dbDel(id) {
  sync('sy','삭제 중...');
  try {
    const {error} = await db.from('memos').delete().eq('id', id);
    if(error) throw error;
    sync('on','동기화됨 ✓');
    toast('🗑 삭제됨');
    await load();
  } catch(e) { sync('er','삭제 실패'); toast('❌ 삭제 실패'); }
}

async function dbUpdate(id, fields) {
  sync('sy','수정 중...');
  try {
    const {error} = await db.from('memos').update(fields).eq('id', id);
    if(error) throw error;
    sync('on','동기화됨 ✓');
    await load();
  } catch(e) { sync('er','수정 실패'); }
}

// ── Render ──
function render() {
  const q = document.getElementById('srch').value.trim();
  const list = document.getElementById('mlist');
  let items = memos.filter(m => {
    const pf = filter==='all' || (m.priority||'none')===filter;
    const qf = !q || m.text.toLowerCase().includes(q.toLowerCase());
    return pf && qf;
  });
  if(sortAsc) items = items.slice().reverse();

  if(!items.length) {
    list.innerHTML = '<div class="empty"><div class="ei">📝</div><p>'+(q?'"'+q+'"에 해당하는 메모가 없어요':'첫 메모를 남겨보세요<br>아무렇게나 적어도 찰떡같이 저장돼요 ✨')+'</p></div>';
    return;
  }

  const bdg = {high:'!',mid:'–',low:'✓',none:'·'};
  const frag = document.createDocumentFragment();

  items.forEach(function(m) {
    const p = m.priority||'none';
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = m.id;
    card.dataset.p = p;

    // top row
    const ctop = document.createElement('div');
    ctop.className = 'ctop';

    // badge
    const badge = document.createElement('button');
    badge.className = 'badge';
    badge.dataset.p = p;
    badge.textContent = bdg[p];
    badge.addEventListener('click', function() { openPop(m.id); });

    // text
    const mtext = document.createElement('div');
    mtext.className = 'mtext';
    mtext.innerHTML = toHtml(m.text, q);

    // buttons
    const cbtns = document.createElement('div');
    cbtns.className = 'cbtns';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'abtn';
    copyBtn.textContent = '📋';
    copyBtn.addEventListener('click', function() {
      navigator.clipboard.writeText(m.text).then(()=>toast('📋 복사됨'));
    });

    const editBtn = document.createElement('button');
    editBtn.className = 'abtn';
    editBtn.textContent = '✏️';
    editBtn.addEventListener('click', function() { startEdit(m.id, mtext, m.text); });

    const delBtn = document.createElement('button');
    delBtn.className = 'abtn';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', function() {
      card.classList.add('del');
      setTimeout(()=>dbDel(m.id), 220);
    });

    cbtns.appendChild(copyBtn);
    cbtns.appendChild(editBtn);
    cbtns.appendChild(delBtn);

    ctop.appendChild(badge);
    ctop.appendChild(mtext);
    ctop.appendChild(cbtns);

    // bottom
    const cbot = document.createElement('div');
    cbot.className = 'cbot';

    const tags = document.createElement('div');
    tags.className = 'tags';
    m.tags.forEach(function(tg) {
      const sp = document.createElement('span');
      sp.className = 'tag';
      sp.textContent = tg;
      tags.appendChild(sp);
    });

    const mtime = document.createElement('span');
    mtime.className = 'mtime';
    mtime.textContent = ftime(m.ts);

    cbot.appendChild(tags);
    cbot.appendChild(mtime);

    card.appendChild(ctop);
    card.appendChild(cbot);
    frag.appendChild(card);
  });

  list.innerHTML = '';
  list.appendChild(frag);
}

function startEdit(id, el, origText) {
  if(el.querySelector('textarea')) return;
  const ta = document.createElement('textarea');
  ta.className = 'etarea';
  ta.value = origText;
  el.innerHTML = '';
  el.appendChild(ta);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
  ta.addEventListener('blur', async function() {
    const newText = ta.value.trim();
    if(newText && newText !== origText) {
      await dbUpdate(id, {text:newText, tags:JSON.stringify(autoTag(newText))});
      toast('✏️ 수정됨');
    } else {
      render();
    }
  });
}

// ── Priority popup ──
function openPop(id) {
  popId = id;
  document.getElementById('ppop').classList.add('show');
}
function closePop() {
  popId = null;
  document.getElementById('ppop').classList.remove('show');
}
document.getElementById('ppop').addEventListener('click', async function(e) {
  const opt = e.target.closest('.popt');
  if(!opt || !popId) return;
  const pv = opt.dataset.pv;
  const id = popId;
  closePop();
  await dbUpdate(id, {priority:pv});
  toast({high:'🔴 긴급',mid:'🟡 보통',low:'🟢 낮음',none:'미설정'}[pv]+' 설정됨');
});
document.addEventListener('click', function(e) {
  if(!e.target.closest('#ppop') && !e.target.closest('.badge')) closePop();
});

// ── Priority select ──
document.getElementById('prow').addEventListener('click', function(e) {
  const btn = e.target.closest('.pbtn');
  if(!btn) return;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  pri = btn.dataset.p;
});

// ── Filter ──
document.getElementById('fchips').addEventListener('click', function(e) {
  const chip = e.target.closest('.chip');
  if(!chip) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  chip.classList.add('on');
  filter = chip.dataset.f;
  render();
});

// ── Save ──
document.getElementById('savebtn').addEventListener('click', async function() {
  const inp = document.getElementById('minput');
  const text = inp.value.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();
  if(!text) return;
  this.disabled = true;
  inp.value = ''; inp.style.height = '';
  document.getElementById('ccount').textContent = '0자';
  await dbAdd(text, pri, autoTag(text));
  toast('✅ 저장됨');
  this.disabled = false;
});

document.getElementById('minput').addEventListener('keydown', function(e) {
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); document.getElementById('savebtn').click(); }
});
document.getElementById('minput').addEventListener('input', function() {
  document.getElementById('ccount').textContent = this.value.length+'자';
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,170)+'px';
});

// ── Search / Sort / Clear ──
document.getElementById('srch').addEventListener('input', render);
document.getElementById('sortbtn').addEventListener('click', function() {
  sortAsc=!sortAsc;
  document.getElementById('sortlbl').textContent=sortAsc?'오래된순':'최신순';
  render();
});
document.getElementById('clearbtn').addEventListener('click', async function() {
  if(!memos.length) return;
  if(!confirm('메모 '+memos.length+'개를 모두 삭제할까요?')) return;
  sync('sy','삭제 중...');
  try {
    const {error} = await db.from('memos').delete().neq('id',0);
    if(error) throw error;
    sync('on','동기화됨 ✓');
    toast('🗑 전체 삭제됨');
    await load();
  } catch(e) { sync('er','삭제 실패'); }
});

// ── PWA ──
let dp = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault(); dp=e;
  if(!localStorage.getItem('ib_dismissed')) document.getElementById('ibanner').classList.add('show');
});
document.getElementById('ibtn').addEventListener('click', async function() {
  if(!dp) return;
  dp.prompt();
  const {outcome} = await dp.userChoice;
  if(outcome==='accepted') toast('📱 앱이 설치됐어요!');
  dp=null; document.getElementById('ibanner').classList.remove('show');
});
document.getElementById('iclose').addEventListener('click', function() {
  localStorage.setItem('ib_dismissed','1');
  document.getElementById('ibanner').classList.remove('show');
});

// ── Realtime ──
db.channel('memo-rt').on('postgres_changes',{event:'*',schema:'public',table:'memos'},load).subscribe();

// ── SW ──
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});

// ── Start ──
load();
</script>
</body>
</html>
